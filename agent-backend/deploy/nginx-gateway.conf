server {
    listen 80;
    server_name autogentgroup.ru www.autogentgroup.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name autogentgroup.ru www.autogentgroup.ru;

    ssl_certificate     /etc/letsencrypt/live/autogentgroup.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autogentgroup.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/autogent;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gateway API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        # CRITICAL: pass real client IP to gateway for rate limiting
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
    }
}
